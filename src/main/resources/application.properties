# Configurações do Thymeleaf
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Configurações do banco de dados (HÍBRIDO - local + produção)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/funcionarioproject?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:010905Euja#}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Configuração da porta do servidor
server.port=${SERVER_PORT:8082}
server.address=0.0.0.0

# Configurações do MVC
spring.mvc.view.prefix=/templates/
spring.mvc.view.suffix=.html

# Configurações de logging
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.cache.interceptor=DEBUG
logging.level.org.springframework.web=DEBUG

# Configurações de cache
spring.cache.type=simple
spring.cache.cache-names=relatoriosPorCargo, relatoriosPorDepartamento

# Estatísticas do Hibernate
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false